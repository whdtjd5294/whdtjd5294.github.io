<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에스에듀 허브 | 강사 전용</title>
  <link rel="icon" type="image/svg+xml" href="./favicon-sedu-mint.svg" />
  <link rel="shortcut icon" href="./favicon-sedu-mint.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-main: #f6f8fc;
      --ink: #1f2b39;
      --ink-soft: #5a6775;
      --line: rgba(83, 102, 130, 0.2);
      --glass: rgba(255, 255, 255, 0.76);
      --shadow: 0 22px 45px rgba(27, 44, 66, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 22%, rgba(86, 160, 255, 0.12), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(109, 227, 193, 0.18), transparent 28%),
        radial-gradient(circle at 82% 85%, rgba(255, 181, 140, 0.2), transparent 30%),
        linear-gradient(160deg, #fcfdff, var(--bg-main));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(111, 136, 168, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(111, 136, 168, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 92%);
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      width: min(74vw, 920px);
      aspect-ratio: 1 / 1;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      background: url("https://raw.githubusercontent.com/whdtjd5294/whdtjd5294.github.io/main/sedu_logo.png") center / contain no-repeat;
      opacity: 0.16;
      filter: grayscale(1) saturate(0) brightness(2.2) contrast(0.7);
      pointer-events: none;
      z-index: -2;
    }

    .wrap {
      width: min(960px, 92vw);
      margin: 28px auto 34px;
    }

    .top,
    .board {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: #fff;
      padding: 5px;
      object-fit: contain;
      box-shadow: 0 8px 16px rgba(30, 47, 74, 0.12);
      border: 1px solid rgba(95, 124, 160, 0.22);
    }

    .brand h1 {
      margin: 0;
      font: 700 1.08rem/1.2 "Sora", sans-serif;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--ink-soft);
      font-size: 0.86rem;
    }

    .board {
      margin-top: 18px;
      padding: 16px;
    }

    .intro {
      border-radius: 24px;
      border: 1px solid rgba(118, 140, 173, 0.24);
      background:
        radial-gradient(circle at 80% 16%, rgba(148, 221, 255, 0.52), transparent 32%),
        linear-gradient(130deg, #f9fcff, #eef4fb 45%, #f7fbff);
      padding: 15px 18px;
      margin: 0 auto 12px;
      max-width: 860px;
    }

    .intro h2 {
      margin: 0;
      font: 800 clamp(1.08rem, 1.8vw, 1.55rem)/1.2 "Sora", sans-serif;
    }

    .intro p {
      margin: 8px 0 0;
      color: #4d5c6d;
      line-height: 1.55;
      font-size: 0.82rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 860px;
      margin: 0 auto;
    }

    .hub-card {
      position: relative;
      overflow: hidden;
      min-height: 168px;
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      text-decoration: none;
      color: #fff;
      box-shadow: 0 18px 30px rgba(47, 78, 115, 0.18);
      transform: translateY(10px);
      opacity: 0;
      animation: card-in 0.6s ease forwards;
      transition: transform 0.36s cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 0.36s ease, filter 0.36s ease;
    }

    .hub-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 78% 30%, rgba(255, 255, 255, 0.28), transparent 32%);
      pointer-events: none;
    }

    .hub-card:hover,
    .hub-card:focus-visible {
      transform: translateY(-5px) scale(1.015);
      box-shadow: 0 26px 44px rgba(34, 56, 84, 0.28);
      filter: saturate(1.08);
    }

    .hub-card[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: 16px;
      top: -8px;
      transform: translateY(-100%);
      max-width: calc(100% - 34px);
      padding: 7px 10px;
      border-radius: 10px;
      background: rgba(31, 48, 70, 0.9);
      color: #f8fbff;
      font-size: 0.76rem;
      line-height: 1.35;
      border: 1px solid rgba(173, 205, 242, 0.28);
      box-shadow: 0 10px 18px rgba(22, 36, 56, 0.2);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .hub-card:hover::after,
    .hub-card:focus-visible::after {
      opacity: 1;
      visibility: visible;
      transform: translateY(-100%) translateX(4px);
    }

    .label {
      display: inline-block;
      font: 700 0.76rem/1 "Sora", sans-serif;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.9);
    }

    .hub-card h3 {
      margin: 26px 0 7px;
      font: 800 clamp(1.35rem, 2.2vw, 2rem)/1.2 "Noto Sans KR", sans-serif;
      letter-spacing: -0.01em;
    }

    .hub-card p {
      margin: 0;
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .go {
      position: absolute;
      right: 14px;
      bottom: 12px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.46);
      background: rgba(255, 255, 255, 0.22);
      display: grid;
      place-items: center;
      font-size: 1.05rem;
      font-weight: 700;
      transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
    }

    .hub-card:hover .go,
    .hub-card:focus-visible .go {
      transform: translateY(-1px) scale(1.06);
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.7);
    }

    .live {
      grid-column: span 2;
      background:
        radial-gradient(circle at 22% 80%, rgba(29, 105, 180, 0.34), transparent 40%),
        linear-gradient(128deg, #2fb6dd, #43d0bc 50%, #8be7c7);
      animation-delay: 0.06s;
    }

    .teacher {
      background:
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.2), transparent 34%),
        linear-gradient(145deg, #3d72df, #5f97f9 54%, #88c7ff);
      animation-delay: 0.14s;
    }

    .slms {
      background:
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.24), transparent 34%),
        linear-gradient(145deg, #3b6c63, #52a48f 56%, #87d9c1);
      animation-delay: 0.22s;
    }

    footer {
      margin-top: 12px;
      text-align: right;
      color: #7d8ea3;
      font-size: 0.78rem;
    }

    @keyframes card-in {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 580px) {
      .wrap { width: min(96vw, 560px); margin-top: 14px; }
      .top, .board { border-radius: 22px; }
      .grid { grid-template-columns: 1fr; }
      .live { grid-column: span 1; }
      .hub-card { border-radius: 18px; min-height: 156px; }
      .intro { padding: 13px 14px; }
      .brand img { width: 40px; height: 40px; }
      .brand h1 { font-size: 0.98rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">
        <img src="https://raw.githubusercontent.com/whdtjd5294/whdtjd5294.github.io/main/sedu_logo.png" alt="에스에듀 로고" />
        <div>
          <h1>에스에듀 허브</h1>
          <p>강사 전용</p>
        </div>
      </div>
    </header>

    <main class="board">
      <section class="intro">
        <h2>강사 전용 메뉴</h2>
        <p>수업 운영에 필요한 핵심 도구만 빠르게 접근할 수 있도록 구성했습니다.</p>
      </section>

      <section class="grid">
        <a class="hub-card live" data-tip="당일 수업 현황과 반 배정을 실시간으로 확인" href="https://url.kr/jrh2sy" target="_blank" rel="noopener noreferrer">
          <span class="label">REAL-TIME</span>
          <h3>라이브 시간표</h3>
          <p>당일 수업 현황과 반 배정을 실시간으로 확인</p>
          <span class="go">↗</span>
        </a>

        <a class="hub-card teacher" data-tip="출결, 수업 기록, 자료 업로드" href="https://joo.is/seduportal" target="_blank" rel="noopener noreferrer">
          <span class="label">TEACHER</span>
          <h3>강사 포털</h3>
          <p>출결, 수업 기록, 자료 업로드</p>
          <span class="go">↗</span>
        </a>

        <a class="hub-card slms" data-tip="학생별 티칭로그, 첫수업 정보, 학교별 내신 기출 자료 확인" href="#" target="_blank" rel="noopener noreferrer">
          <span class="label">S-LMS</span>
          <h3>에스LMS</h3>
          <p>티칭로그, 첫수업 정보, 학교별 내신 기출 자료 확인</p>
          <span class="go">↗</span>
        </a>
      </section>
    </main>

    <footer>© S-EDU HUB</footer>
  </div>
</body>
</html>
